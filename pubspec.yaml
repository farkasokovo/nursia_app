name: nursia_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  phosphor_flutter: ^2.1.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.5
  sqflite: ^2.3.0  
  path: ^1.9.0     

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  

flutter:
  uses-material-design: true
  fonts:
  - family: Poppins
    fonts:
      - asset: assets/fonts/Poppins-Regular.ttf
        weight: 400
      - asset: assets/fonts/Poppins-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Poppins-Bold.ttf
        weight: 700
  assets:
  - assets/data/scales_data.json
  - assets/data/calculadoras_info.json
  - assets/data/escalas_lista.json
  - assets/data/medicamentos.json
  - assets/data/tips.json
  - assets/data/normas_data.json
  - assets/data/pendientes_data.json
