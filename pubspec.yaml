name: nursia_app
description: "Herramienta de referencia clínica offline para profesionales y estudiantes de enfermería."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  phosphor_flutter: ^2.1.0
  url_launcher: ^6.3.2
  sqflite: ^2.3.0
  path: ^1.9.0     
  provider: ^6.1.2
  package_info_plus: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.7

# Configuración de íconos de la app (Nurska).
# La imagen aún no existe: coloca el logo en assets/icon/nurska_icon.png
# y genera los íconos con:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/nurska_icon.png"
  adaptive_icon_background: "#96775B"
  adaptive_icon_foreground: "assets/icon/nurska_icon.png"

# Configuración de la pantalla de inicio nativa (splash) de Nurska.
# Genera los archivos nativos con:  dart run flutter_native_splash:create
flutter_native_splash:
  color: "#624933"
  image: "assets/icon/nurska_icon.png"
  android: true
  ios: false
  web: false

  # Android 12+ maneja el splash con su propia API (SplashScreen), distinta
  # a la de versiones anteriores — por eso necesita su propia sección.
  android_12:
    color: "#624933"
    image: "assets/icon/nurska_icon.png"
    icon_background_color: "#624933"

flutter:
  uses-material-design: true
  fonts:
  - family: Poppins
    fonts:
      - asset: assets/fonts/Poppins-Regular.ttf
        weight: 400
      - asset: assets/fonts/Poppins-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Poppins-Bold.ttf
        weight: 700
  assets:
  - assets/data/scales_data.json
  - assets/data/calculadoras_info.json
  - assets/data/escalas_lista.json
  - assets/data/medicamentos.json
  - assets/data/tips.json
  - assets/data/normas_data.json
  - assets/data/pendientes_data.json
